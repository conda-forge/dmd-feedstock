{% set version = "2.109.1" %}

package:
  name: dmd
  version: {{ version }}

source:
  - url: https://github.com/dlang/dmd/archive/v{{ version }}.tar.gz
    sha256: e6df7517fbdce8406e234119c5a30ebf924efa590831fea689eccef8c73cbda4
    target_directory: dmd
  - url: https://github.com/dlang/phobos/archive/v{{ version }}.tar.gz
    sha256: 22b1dbd4326d7c2ee2fc9bc56c681db921c604280046296fcc21d706d328b632
    target_directory: phobos

build:
  number: 0
  skip: True  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - ldc
    - make
  
test:
  commands:
    - dmd --version 2>&1 | grep -q \"D Compiler\"

about:
  home: https://github.com/dlang/dmd
  license: BSL-1.0
  license_file: dmd/LICENSE.txt
  summary: 'DMD is the reference compiler for the D programming language.'

extra:
  recipe-maintainers:
    - danielnachun
    - pirovc
